global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "loyaltyos-api"
    metrics_path: "/metrics"
    static_configs:
      - targets: ["api:3002"]
        labels:
          service_name: "loyaltyos-api"
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: "api:3002"

  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
