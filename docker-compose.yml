services:
  postgres:
    image: postgres:15-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: loyaltyos
      POSTGRES_PASSWORD: loyaltyos_dev
      POSTGRES_DB: loyaltyos_dev
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U loyaltyos -d loyaltyos_dev"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
