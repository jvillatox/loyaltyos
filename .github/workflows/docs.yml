name: Docs

on:
  push:
    branches: [main]
    paths:
      - docs-site/**
      - docs/**
      - CHANGELOG.md
      - .github/workflows/docs.yml
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: Build & Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm --filter loyaltyos-docs build

      - name: Fetch Helm chart index
        run: |
          mkdir -p docs-site/build/helm
          curl -fsSL \
            https://raw.githubusercontent.com/${{ github.repository }}/gh-pages/index.yaml \
            -o docs-site/build/helm/index.yaml
          echo "Helm index fetched ($(wc -c < docs-site/build/helm/index.yaml) bytes)"

      - uses: actions/configure-pages@v4

      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs-site/build

      - uses: actions/deploy-pages@v5
